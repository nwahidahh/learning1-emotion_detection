<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — Emotion Monitor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container d-flex justify-content-end align-items-center gap-3">
        <p class="mb-0 small">Signed in as: <strong id="userInfo"></strong></p>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
      </div>
    </nav>

    <main class="container py-4">
      <header class="mb-4">
        <h1 class="h3 mb-1">Admin Monitoring & Maintenance</h1>
        <p class="text-body-secondary mb-0">System activity, maintenance controls, and research export</p>
      </header>

      <section class="card shadow-sm border-0 mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">System Stats</h2>
            <button id="refreshAdminStatsBtn" class="btn btn-outline-primary btn-sm">Refresh Stats</button>
          </div>
          <div class="row g-3">
            <div class="col-6 col-md-3"><div class="border rounded p-2">Users: <strong id="statsUsers">0</strong></div></div>
            <div class="col-6 col-md-3"><div class="border rounded p-2">Materials: <strong id="statsMaterials">0</strong></div></div>
            <div class="col-6 col-md-3"><div class="border rounded p-2">Comments: <strong id="statsComments">0</strong></div></div>
            <div class="col-6 col-md-3"><div class="border rounded p-2">Emotion Logs: <strong id="statsLogs">0</strong></div></div>
          </div>
        </div>
      </section>

      <section class="card shadow-sm border-0 mb-3">
        <div class="card-body">
          <h2 class="h5">Maintenance</h2>
          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label for="adminUserId" class="form-label">User ID</label>
              <input id="adminUserId" class="form-control" type="number" min="1" />
            </div>
            <div class="col-12 col-md-4">
              <label for="adminUserActive" class="form-label">Active Status</label>
              <select id="adminUserActive" class="form-select">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
              </select>
            </div>
            <div class="col-12 col-md-4 d-grid">
              <button id="toggleUserActiveBtn" class="btn btn-warning">Update User Status</button>
            </div>
          </div>
          <div class="mt-3">
            <button id="downloadExportBtn" class="btn btn-success">Download Research CSV</button>
          </div>
        </div>
      </section>

      <section class="card shadow-sm border-0 mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 mb-0">Activity Feed</h2>
            <button id="refreshAdminActivityBtn" class="btn btn-outline-primary btn-sm">Refresh Activity</button>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-striped align-middle">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Event</th>
                  <th>Actor</th>
                  <th>Detail</th>
                </tr>
              </thead>
              <tbody id="adminActivityBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="messageSection" class="mb-3">
        <div id="appMessage" class="alert d-none mb-0" role="alert"></div>
      </section>
    </main>

    <script src="/static/app.js?v=20260425"></script>
  </body>
</html>
