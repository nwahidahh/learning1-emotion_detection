<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — Emotion Monitor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-4 py-md-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="text-center mb-4">
            <h1 class="h3 fw-semibold mb-2">Emotion & Engagement Monitor</h1>
            <p class="text-body-secondary mb-0">Arousal–Valence Learning Prototype</p>
          </div>

          <section id="authSection" class="card shadow-sm border-0">
            <div class="card-body p-4">
              <h2 class="h5 mb-3">Login</h2>

              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email</label>
                <input id="loginEmail" type="email" class="form-control" placeholder="name@example.com" />
              </div>

              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input id="loginPassword" type="password" class="form-control" placeholder="Enter your password" />
              </div>

              <div class="d-grid mb-3">
                <button id="loginBtn" class="btn btn-primary">Login</button>
              </div>

              <p class="small mb-0 text-body-secondary">
                Don't have an account?
                <a href="/static/register.html" class="link-primary text-decoration-none">Register</a>
              </p>
            </div>
          </section>

          <section id="messageSection" class="mt-3">
            <div id="appMessage" class="alert d-none mb-0" role="alert"></div>
          </section>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/static/app.js?v=20260423"></script>
  </body>
</html>
