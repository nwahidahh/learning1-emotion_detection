<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teacher — Emotion Monitor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container d-flex justify-content-end align-items-center gap-3">
        <p class="mb-0 small">Signed in as: <strong id="userInfo"></strong></p>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
      </div>
    </nav>

    <main class="container py-4">
      <header class="mb-4">
        <h1 class="h3 mb-1">Teacher Material Management</h1>
        <p class="text-body-secondary mb-0">Upload/assign materials, edit instructions, and review comments</p>
      </header>

      <section class="card shadow-sm border-0 mb-3">
        <div class="card-body">
          <h2 class="h5">Upload Material</h2>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="teacherTitle" class="form-label">Title</label>
              <input id="teacherTitle" class="form-control" type="text" />
            </div>
            <div class="col-12 col-md-6">
              <label for="teacherSubject" class="form-label">Subject</label>
              <input id="teacherSubject" class="form-control" type="text" />
            </div>
            <div class="col-12 col-md-3">
              <label for="teacherMaterialType" class="form-label">Type</label>
              <select id="teacherMaterialType" class="form-select">
                <option value="pdf">PDF</option>
                <option value="link">Website Link</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <label for="teacherDuration" class="form-label">Duration (min)</label>
              <input id="teacherDuration" class="form-control" type="number" min="0" />
            </div>
            <div class="col-12 col-md-6">
              <label for="teacherExternalUrl" class="form-label">External URL (for link)</label>
              <input id="teacherExternalUrl" class="form-control" type="url" placeholder="https://..." />
            </div>
            <div class="col-12">
              <label for="teacherInstruction" class="form-label">Instruction</label>
              <textarea id="teacherInstruction" class="form-control" rows="2" maxlength="4000"></textarea>
            </div>
            <div class="col-12 col-md-8">
              <label for="teacherFile" class="form-label">PDF File (for pdf)</label>
              <input id="teacherFile" class="form-control" type="file" accept="application/pdf" />
            </div>
            <div class="col-12 col-md-4 d-grid align-self-end">
              <button id="teacherUploadBtn" class="btn btn-primary">Upload</button>
            </div>
          </div>
        </div>
      </section>

      <section class="card shadow-sm border-0 mb-3">
        <div class="card-body">
          <h2 class="h5">Edit Material & Assignment</h2>
          <div class="row g-3">
            <div class="col-12 col-lg-6">
              <label for="teacherMaterialSelect" class="form-label">Your Materials</label>
              <select id="teacherMaterialSelect" class="form-select"></select>
            </div>
            <div class="col-12 col-lg-3 d-grid align-self-end">
              <button id="loadTeacherMaterialBtn" class="btn btn-outline-primary">Load Selected</button>
            </div>
          </div>
          <div class="row g-3 mt-1">
            <div class="col-12 col-md-6">
              <label for="editTitle" class="form-label">Title</label>
              <input id="editTitle" class="form-control" type="text" />
            </div>
            <div class="col-12 col-md-6">
              <label for="editSubject" class="form-label">Subject</label>
              <input id="editSubject" class="form-control" type="text" />
            </div>
            <div class="col-12 col-md-4">
              <label for="editDuration" class="form-label">Duration (min)</label>
              <input id="editDuration" class="form-control" type="number" min="0" />
            </div>
            <div class="col-12 col-md-8">
              <label for="editExternalUrl" class="form-label">External URL</label>
              <input id="editExternalUrl" class="form-control" type="url" />
            </div>
            <div class="col-12">
              <label for="editInstruction" class="form-label">Instruction</label>
              <textarea id="editInstruction" class="form-control" rows="2" maxlength="4000"></textarea>
            </div>
            <div class="col-12 col-md-4 d-grid">
              <button id="saveMaterialEditBtn" class="btn btn-success">Save Edit</button>
            </div>
          </div>

          <hr />

          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label for="assignStudentId" class="form-label">Assign Student ID</label>
              <input id="assignStudentId" class="form-control" type="number" min="1" />
            </div>
            <div class="col-12 col-md-4 d-grid">
              <button id="assignMaterialBtn" class="btn btn-outline-secondary">Assign Material</button>
            </div>
          </div>
        </div>
      </section>

      <section class="card shadow-sm border-0 mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 mb-0">Comments / Questions</h2>
            <button id="loadTeacherCommentsBtn" class="btn btn-outline-primary btn-sm">Refresh Comments</button>
          </div>
          <div id="teacherComments" class="small"></div>
        </div>
      </section>

      <section id="messageSection" class="mb-3">
        <div id="appMessage" class="alert d-none mb-0" role="alert"></div>
      </section>
    </main>

    <script src="/static/app.js?v=20260425"></script>
  </body>
</html>
